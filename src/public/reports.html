<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports — TMC Pharmacy</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/report.css">
</head>
<body>
    <div class="topbar">
        <div class="brand"><img src="/img/logo.jpg" alt="TMC"> Reports</div>
        <div class="right">
            <a href="/dashboard">← Review</a>
            <span class="muted" id="whoami"></span>
            <button class="ghost sm" id="logout">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="controls card no-print">
            <div>
                <label>Show</label>
                <select id="reason">
                    <option value="both">Both reasons</option>
                    <option value="not_in_formulary">Not in Formulary</option>
                    <option value="out_of_stock">Out of stock</option>
                </select>
            </div>
            <div>
                <label>Department</label>
                <select id="department"><option value="all">All departments</option></select>
            </div>
            <div><label>From</label><input id="from" type="date"></div>
            <div><label>To</label><input id="to" type="date"></div>
            <div class="spacer"></div>
            <div><button id="genBtn">Generate</button></div>
            <div><button id="csvBtn" class="ghost">Export CSV</button></div>
            <div><button id="printBtn" class="ghost">Print / PDF</button></div>
        </div>

        <div id="report" class="card report-card">
            <div class="report-header">
                <img src="/img/logo.jpg" alt="TMC" class="rh-logo">
                <div>
                    <div class="rh-title">TAGUM MEDICAL CITY</div>
                    <div class="rh-sub">High-Demand Drugs — Not in Formulary &amp; Out of Stock</div>
                    <div class="rh-meta" id="reportMeta"></div>
                </div>
            </div>

            <div class="rkpis" id="reportKpis"></div>

            <table id="reportTable">
                <thead>
                    <tr><th>Medicine</th><th>Reason</th><th>Prescriptions</th><th>Volume</th><th>Departments</th><th>Status</th></tr>
                </thead>
            </table>
            <div class="empty" id="reportEmpty" style="display:none">No prescriptions in this period.</div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/reports.js"></script>
</body>
</html>
